<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Rush Arena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="glass panel hero">
      <h1>🖤 Love Rush Arena</h1>
      <p>Black, white, and a red pulse — invite your partner with a love-letter code.</p>
    </header>

    <section id="lobby" class="glass panel lobby">
      <h2>Choose your duo mode</h2>
      <div class="lobby-form">
        <input id="loverName" type="text" maxlength="20" placeholder="Your name" />
        <div class="actions">
          <button id="createRoomBtn">Create Duo Room</button>
          <button id="createBotBtn">Play with Cupid Bot</button>
        </div>
        <div class="join-row">
          <input id="roomCodeInput" type="text" maxlength="6" placeholder="Love code" />
          <button id="joinRoomBtn">Join by Code</button>
        </div>
      </div>
      <p id="joinError" class="error"></p>
      <div id="loveLetter" class="love-letter hidden"></div>
    </section>

    <section class="hud-grid">
      <div class="glass panel info-panel">
        <h2>How to play</h2>
        <ul>
          <li>⌨️ Arrow Keys / WASD</li>
          <li>📱 Touch controls on mobile</li>
          <li>🧭 Gyroscope control in portrait mode</li>
          <li>💌 Share your love code</li>
        </ul>
        <button id="gyroBtn" class="gyro-btn">Enable Gyroscope</button>
      </div>

      <div class="glass panel score-panel">
        <h2>Live Scoreboard</h2>
        <div id="statusPill" class="status-pill">Connecting…</div>
        <div id="roomBadge" class="room-badge">Room: —</div>
        <div id="scores"></div>
      </div>
    </section>

    <main class="glass panel game-panel">
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="960" height="600"></canvas>
      </div>

      <div id="touchPad" class="touch-pad" aria-label="Touch controls">
        <button data-dir="up">▲</button>
        <div class="middle-row">
          <button data-dir="left">◀</button>
          <button data-dir="down">▼</button>
          <button data-dir="right">▶</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
