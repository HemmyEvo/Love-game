<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Rush Arena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="glass panel hero">
      <h1>💗 Love Rush Arena</h1>
      <p>Invite your favorite person with a love-letter code and play together.</p>
    </header>

    <section id="lobby" class="glass panel lobby">
      <h2>Choose your love mode</h2>
      <div class="lobby-form">
        <input id="loverName" type="text" maxlength="20" placeholder="Your lover name" />
        <div class="actions">
          <button id="createRoomBtn">Create Duo Room</button>
          <button id="createBotBtn">Play with Cupid Bot</button>
        </div>
        <div class="join-row">
          <input id="roomCodeInput" type="text" maxlength="6" placeholder="Love code (e.g. LOVEXY)" />
          <button id="joinRoomBtn">Join by Code</button>
        </div>
      </div>
      <p id="joinError" class="error"></p>
      <div id="loveLetter" class="love-letter hidden"></div>
    </section>

    <section class="hud-grid">
      <div class="glass panel info-panel">
        <h2>How to play</h2>
        <ul>
          <li>⌨️ Move with <strong>Arrow Keys</strong> or <strong>WASD</strong>.</li>
          <li>📱 On mobile, use touch controls.</li>
          <li>💌 Share your unique code to invite your lover.</li>
        </ul>
      </div>

      <div class="glass panel score-panel">
        <h2>Live Scoreboard</h2>
        <div id="statusPill" class="status-pill">Connecting…</div>
        <div id="roomBadge" class="room-badge">Room: —</div>
        <div id="scores"></div>
      </div>
    </section>

    <main class="glass panel game-panel">
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="960" height="600"></canvas>
      </div>

      <div id="touchPad" class="touch-pad" aria-label="Touch controls">
        <button data-dir="up">▲</button>
        <div class="middle-row">
          <button data-dir="left">◀</button>
          <button data-dir="down">▼</button>
          <button data-dir="right">▶</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
